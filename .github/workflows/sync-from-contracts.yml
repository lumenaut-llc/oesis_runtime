name: Sync from contracts

# Listens for contracts-updated dispatches from oesis-contracts and opens a PR
# mirroring canonical example files (lanes v0.1, v1.0, v1.5). Example overlays
# for lanes v0.2–v0.5 are runtime-owned and not touched here.

on:
  repository_dispatch:
    types: [contracts-updated]
  workflow_dispatch:
    inputs:
      contracts_sha:
        description: 'Contracts SHA to sync (defaults to HEAD of lumenaut-llc/oesis-contracts main)'
        required: false
        default: ''
      lanes_changed:
        description: 'Comma-separated lanes changed in contracts'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout self
        uses: actions/checkout@v4

      - name: Resolve contracts SHA
        id: cref
        shell: bash
        run: |
          sha="${{ github.event.client_payload.contracts_sha || inputs.contracts_sha }}"
          if [ -z "$sha" ]; then
            sha=$(git ls-remote https://github.com/lumenaut-llc/oesis-contracts.git HEAD | awk '{print $1}')
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short=${sha:0:12}" >> "$GITHUB_OUTPUT"

      - name: Checkout oesis-contracts
        uses: actions/checkout@v4
        with:
          repository: lumenaut-llc/oesis-contracts
          ref: ${{ steps.cref.outputs.sha }}
          path: _contracts

      - name: Checkout oesis-program-specs (for repo_split.py)
        uses: actions/checkout@v4
        with:
          repository: lumenaut-llc/oesis-program-specs
          path: _specs

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sync
        id: sync
        shell: bash
        run: |
          set -euo pipefail
          python3 _specs/scripts/repo_split.py sync-runtime-assets \
            --specs-root _specs \
            --contracts-root _contracts \
            --runtime-root . \
            --contracts-ref "${{ steps.cref.outputs.sha }}" \
            --json | tee sync-summary.json
          rm -rf _contracts _specs

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync/contracts-${{ steps.cref.outputs.short }}
          commit-message: "chore(sync): contracts @ ${{ steps.cref.outputs.short }}"
          title: "chore(sync): contracts @ ${{ steps.cref.outputs.short }}"
          body: |
            Automated sync from [oesis-contracts@${{ steps.cref.outputs.short }}](https://github.com/lumenaut-llc/oesis-contracts/commit/${{ steps.cref.outputs.sha }}).

            Lanes changed in contracts: `${{ github.event.client_payload.lanes_changed || inputs.lanes_changed || 'unknown' }}`

            <details><summary>Sync summary (JSON)</summary>

            ```json
            ${{ steps.sync.outputs.summary || '' }}
            ```

            </details>

            Generated by `.github/workflows/sync-from-contracts.yml`.
          labels: |
            automated
            contracts-sync
          delete-branch: true
          add-paths: |
            oesis/assets/**
            sync-summary.json
